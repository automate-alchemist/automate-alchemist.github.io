<!DOCTYPE html>
<html>
<head>
<style>
  .book-review {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
  }
  
  .book-header {
    margin-bottom: 2rem;
  }
  
  .book-metadata {
    display: flex;
    gap: 1.5rem;
    margin: 1rem 0;
    color: #666;
    font-size: 0.9rem;
  }
  
  .book-cover {
    float: right;
    margin: 0 0 2rem 2rem;
    max-width: 300px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  
  .book-cover:hover {
    transform: scale(1.02);
  }
  
  .book-content {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #333;
  }
  
  .book-tags {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #eee;
  }
  
  .tag {
    display: inline-block;
    padding: 0.3rem 0.8rem;
    margin: 0.2rem;
    background: #f5f5f5;
    border-radius: 3px;
    font-size: 0.9rem;
    color: #666;
  }
  
  .rating {
    color: #ffd700;
  }
  
  @media (max-width: 768px) {
    .book-cover {
      float: none;
      margin: 1rem auto;
      display: block;
    }
  }
</style>
</head>
<body>
  <article class="book-review">
    <header class="book-header">
      <h1>{{ page.title }}</h1>
      <div class="book-metadata">
        <span>By {{ page.book_author }}</span>
        <span>Published {{ page.publication_year }}</span>
        <span>{{ page.reading_time }} read</span>
        <span class="rating">★★★★★</span>
      </div>
    </header>

    <img src="{{ page.cover_image }}" alt="{{ page.title }}" class="book-cover">

    <div class="book-content">
      {{ content }}
    </div>

    <footer class="book-tags">
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </footer>
  </article>
</body>
</html>
